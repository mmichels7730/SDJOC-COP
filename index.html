                  <iframe src="https://outages.sdrea.coop/" style={{width:"100%",height:"100%",border:"none",background:"#fff"}} title="SD Rural Electric Outages"/>
                </div>

                {/* Individual utility links */}
                <div style={{fontSize:9,color:"#446070",marginBottom:6,letterSpacing:"0.08em",fontWeight:700}}>MAJOR UTILITY OUTAGE CENTERS</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {[
                    ["⚡ NorthWestern Energy (RC area)","https://www.northwesternenergy.com/outages","#d09010"],
                    ["⚡ Black Hills Energy (RC / western SD)","https://www.blackhillsenergy.com/outages-and-safety/outage-center","#d09010"],
                    ["⚡ Xcel Energy (eastern SD)","https://www.xcelenergy.com/outages","#d09010"],
                    ["⚡ Montana-Dakota Utilities","https://customer.montana-dakota.com/outage-map","#d09010"],
                    ["⚡ SD Rural Electric — Full Outage Map","https://outages.sdrea.coop/","#22aa5c"],
                  ].map(([l,u,c])=>(
                    <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"10",border:`1px solid ${c}20`}}>{l}</a>
                  ))}
                </div>

                {/* County links */}
                <div style={{fontSize:9,color:"#446070",marginTop:10,marginBottom:5,letterSpacing:"0.08em",fontWeight:700}}>COUNTY-LEVEL TRACKING</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                  {[
                    ["Pennington (RC)","https://poweroutage.us/area/county/46103"],
                    ["Minnehaha (SF)","https://poweroutage.us/area/county/46099"],
                    ["Hughes (Pierre)","https://poweroutage.us/area/county/46065"],
                    ["Lawrence (Deadwood)","https://poweroutage.us/area/county/46081"],
                  ].map(([l,u])=>(
                    <a key={l} href={u} target="_blank" className="lbtn" style={{color:"#d09010",background:"#d0901010",border:"1px solid #d0901020",fontSize:9}}>📍 {l}</a>
                  ))}
                </div>
                <div style={{marginTop:8,fontSize:8,color:"#304050",lineHeight:1.6}}>
                  NOTE: PowerOutage.us embeds may be blocked by browser security settings. Use direct utility links above for most reliable data during emergencies.
                </div>
              </div>
            </div>
          </div>
        )}

        {/* FEMA */}
        {tab==="fema"&&(
          <div className="card" style={{borderTop:"2px solid #8050d0"}}>
            <CardHdr title="FEMA Declarations — SD & Region (2yr)" icon="📋" accent="#8050d0" count={`${sdFema.length} SD · ${activeFema.length} OPEN`} loading={loading.fema} error={errors.fema}/>
            <div className="card-body">
              {fema.length===0&&!loading.fema?<div style={{color:"#446070",fontSize:11}}>No data. <a href="https://www.fema.gov/disasters" target="_blank" style={{color:"#8050d0"}}>FEMA.gov ▸</a></div>:(
                fema.map((d,i)=>{const open=!d.disasterCloseoutDate,isSd=d.state==="SD";const col=isSd&&open?"#d83828":open?"#d09010":isSd?"#8050d0":"#446070";const it=d.incidentType?.toLowerCase()||"";const icon=it.includes("flood")?"🌊":it.includes("fire")?"🔥":it.includes("winter")||it.includes("snow")?"❄️":it.includes("tornado")||it.includes("wind")?"🌪":"⚠️";return(
                  <div key={i} className="arow" style={{borderLeft:`4px solid ${col}`,background:col+"0c",marginBottom:5}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:3}}>
                      <div><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:2}}>{icon}<Pill label={d.state} color={isSd?"#8050d0":"#446070"} size={9}/><Pill label={d.incidentType||"?"} color={col} size={9}/>{open&&<Pill label="OPEN" color="#d83828" size={9}/>}</div><div style={{color:col,fontSize:11,fontWeight:700}}>{d.declarationTitle}</div></div>
                      <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:9,color:"#446070"}}>{fmtDate(d.declarationDate)}</div>{open&&<div style={{fontSize:8,color:"#d09010"}}>ACTIVE</div>}</div>
                    </div>
                  </div>
                );})
              )}
              <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                {[["FEMA Disasters","https://www.fema.gov/disasters","#8050d0"],["FEMA Region VIII","https://www.fema.gov/region-viii","#8050d0"]].map(([l,u,c])=>(
                  <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* LE / CYBER */}
        {tab==="leo"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div className="card" style={{borderTop:"2px solid #d83828"}}>
              <CardHdr title="FBI / CISA Threat Advisories" icon="🔴" accent="#d83828" count={THREAT_INTEL.length}/>
              <div className="card-body" style={{display:"flex",flexDirection:"column",gap:6}}>
                {THREAT_INTEL.map((t,i)=>{const col=t.severity==="CRITICAL"?"#d83828":t.severity==="HIGH"?"#d09010":"#2080d0",isE=expandedThreat===t.id;return(
                  <div key={t.id} onClick={()=>setExpandedThreat(isE?null:t.id)} className="arow" style={{borderLeft:`4px solid ${col}`,background:col+"0c"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:7}}>
                      <div style={{flex:1}}><div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:2}}><Pill label={t.severity} color={col} size={9}/><Pill label={t.category} color="#6030b0" size={9}/><span style={{fontSize:8,color:"#446070"}}>{t.source} · {t.date}</span></div><div style={{color:col,fontSize:11,fontWeight:700,lineHeight:1.2}}>{t.title}</div></div>
                      <span style={{color:"#446070",fontSize:10}}>{isE?"▲":"▼"}</span>
                    </div>
                    <div style={{fontSize:9,color:"#b8cce0",marginTop:3,lineHeight:1.4}}>{t.summary.substring(0,isE?9999:110)}{!isE&&t.summary.length>110?"…":""}</div>
                    {isE&&<div style={{marginTop:7,borderTop:"1px solid #1a2535",paddingTop:7,display:"flex",flexDirection:"column",gap:5}}>
                      <div style={{background:"#d0901010",border:"1px solid #d0901022",borderRadius:3,padding:"6px 8px"}}><div style={{fontSize:8,color:"#d09010",marginBottom:1}}>AFFECTED</div><div style={{fontSize:9,color:"#b8cce0"}}>{t.affected}</div></div>
                      <div style={{background:"#1a8c4a10",border:"1px solid #1a8c4a22",borderRadius:3,padding:"6px 8px"}}><div style={{fontSize:8,color:"#22aa5c",marginBottom:1}}>ACTIONS</div><div style={{fontSize:9,color:"#b8cce0"}}>{t.action}</div></div>
                      <a href={t.link} target="_blank" className="lbtn" style={{color:"#2080d0",background:"#2080d012",border:"1px solid #2080d025",alignSelf:"flex-start"}}>▸ Full Advisory</a>
                    </div>}
                  </div>
                );})}
              </div>
            </div>
            <div className="card" style={{borderTop:"2px solid #6030b0"}}>
              <CardHdr title="CISA KEV — Most Recent" icon="⚡" accent="#6030b0" count={kev.length} loading={loading.kev} error={errors.kev}/>
              <div className="card-body">
                {kev.length===0?<div style={{color:"#446070",fontSize:11}}>KEV unavailable. <a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" target="_blank" style={{color:"#6030b0"}}>View directly ▸</a></div>:
                  kev.map((v,i)=>{const r=v.knownRansomwareCampaignUse==="Known";return(
                    <div key={i} className="gc" style={{border:`1px solid ${r?"#d8382830":"#1a2535"}`,borderLeft:`3px solid ${r?"#d83828":"#6030b0"}`,marginBottom:4}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:7}}><div><span style={{color:"#8050d0",fontSize:10,fontWeight:700,marginRight:5}}>{v.cveID}</span>{r&&<Pill label="RANSOMWARE" color="#d83828" size={8}/>}</div><span style={{fontSize:8,color:"#446070"}}>{v.dateAdded}</span></div>
                      <div style={{fontSize:9,color:"#b8cce0",marginTop:1}}>{v.product} <span style={{color:"#446070"}}>({v.vendorProject})</span></div>
                      <div style={{fontSize:8,color:"#d09010",marginTop:1}}>DUE: {v.dueDate}</div>
                    </div>
                  );})}
                <a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" target="_blank" className="lbtn" style={{color:"#6030b0",background:"#6030b015",border:"1px solid #6030b025",marginTop:5,display:"inline-block"}}>▸ Full CISA KEV Catalog</a>
              </div>
            </div>
            <div className="card" style={{borderTop:"2px solid #2080d0"}}><CardHdr title="LE & Threat Resources" icon="🔗" accent="#2080d0"/><div className="card-body"><div className="g3">
              {[["🔴 CISA Advisories","https://www.cisa.gov/news-events/cybersecurity-advisories","#d83828"],["🔴 FBI Cyber Alerts","https://www.fbi.gov/investigate/cyber/alerts","#d83828"],["🟡 CISA KEV","https://www.cisa.gov/known-exploited-vulnerabilities-catalog","#d09010"],["🟡 MS-ISAC","https://www.cisecurity.org/ms-isac","#d09010"],["🔵 SD Fusion Center","https://dps.sd.gov/law-enforcement/south-dakota-fusion-center","#2080d0"],["🔵 SD DPS","https://dps.sd.gov/","#2080d0"],["🔵 FBI Denver","https://www.fbi.gov/contact-us/field-offices/denver","#2080d0"],["🟢 SD Emergency Mgmt","https://dps.sd.gov/emergency-services/emergency-management","#22aa5c"],["🟢 FEMA Region VIII","https://www.fema.gov/region-viii","#22aa5c"],["🟢 InfraGard","https://www.infragard.org/","#22aa5c"]].map(([l,u,c])=>(
                <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"0f",border:`1px solid ${c}25`,display:"block",lineHeight:1.5}}>{l}</a>
              ))}
            </div></div></div>
          </div>
        )}

      </div>

      {/* FOOTER */}
      <div style={{borderTop:"1px solid #1a2535",padding:"4px 12px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:3,background:"#0b1018"}}>
        <div style={{fontSize:7,color:"#304050",letterSpacing:"0.06em"}}>NWS · USGS · USDM · NRCS SNOTEL · OPENFEMA · USGS SEISMIC · EPA AIRNOW · CISA KEV · NIFC WFIGS · INCIWEB · SD511 · POWEROUTAGE.US · NASA FIRMS · AUTO-REFRESH 5 MIN</div>
        <div style={{fontSize:7,color:"#304050"}}>UNCLASSIFIED · OPEN-SOURCE · SD ARNG JOC v6.0</div>
      </div>

      <ToastContainer toasts={toasts}/>
    </div>
  );
}

/* PWA Service Worker registration */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`
      self.addEventListener('install',e=>self.skipWaiting());
      self.addEventListener('activate',e=>clients.claim());
      self.addEventListener('fetch',e=>{
        if(e.request.mode==='navigate'){e.respondWith(fetch(e.request).catch(()=>caches.match('/')));}
      });
    `;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
