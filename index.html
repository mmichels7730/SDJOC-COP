/* ═══ RISK MODEL ═══════════════════════════════ */
function computeRisk(alerts,gauges,drought,fema,quakes,aqi){
  let score=0;const factors=[];
  // NWS Alerts — cap warnings at 4 to prevent runaway scoring
  const warn=Math.min(alerts.filter(a=>a.properties?.event?.includes("Warning")&&!a.properties?.event?.toLowerCase().includes("flood")).length,4);
  const watch=Math.min(alerts.filter(a=>a.properties?.event?.includes("Watch")).length,4);
  const fireWx=Math.min(alerts.filter(a=>a.properties?.event?.toLowerCase().includes("fire")||a.properties?.event?.toLowerCase().includes("red flag")).length,3);
  const floodW=Math.min(alerts.filter(a=>a.properties?.event?.toLowerCase().includes("flood warning")).length,3);
  if(warn>0){score+=warn*10;factors.push({label:`${warn} NWS Warning(s) Active`,pts:warn*10,color:"#d83828"})}
  if(watch>0){score+=watch*5;factors.push({label:`${watch} NWS Watch(es) Active`,pts:watch*5,color:"#d09010"})}
  if(fireWx>0){score+=fireWx*10;factors.push({label:`${fireWx} Fire Weather Alert(s)`,pts:fireWx*10,color:"#e06020"})}
  if(floodW>0){score+=floodW*12;factors.push({label:`${floodW} Flood Warning(s)`,pts:floodW*12,color:"#900000"})}
  // Gauges — cap at 3 each
  const atMaj=Math.min(gauges.filter(g=>g.stage&&g.t&&g.stage>=(g.t.m||9999)).length,3);
  const atFld=Math.min(gauges.filter(g=>g.stage&&g.t&&g.stage>=g.t.f&&g.stage<(g.t.m||9999)).length,3);
  if(atMaj>0){score+=atMaj*15;factors.push({label:`${atMaj} Gauge(s) at Major Flood`,pts:atMaj*15,color:"#d83828"})}
  if(atFld>0){score+=atFld*8;factors.push({label:`${atFld} Gauge(s) at Flood Stage`,pts:atFld*8,color:"#d09010"})}
  // Drought — only one level fires
  if(drought){
    const d4=parseFloat(drought.D4||0),d3=parseFloat(drought.D3||0),d2=parseFloat(drought.D2||0);
    if(d4>5){score+=15;factors.push({label:`${d4.toFixed(0)}% SD Exceptional Drought (D4)`,pts:15,color:"#7a0000"})}
    else if(d3>10){score+=10;factors.push({label:`${d3.toFixed(0)}% SD Extreme Drought (D3)`,pts:10,color:"#c02000"})}
    else if(d2>20){score+=6;factors.push({label:`${d2.toFixed(0)}% SD Severe Drought (D2)`,pts:6,color:"#e06010"})}
    else if(d2>5){score+=3;factors.push({label:`${d2.toFixed(0)}% SD Moderate/Severe Drought`,pts:3,color:"#e06010"})}
  }
  // FEMA — cap at 2
  const activeSd=Math.min((fema||[]).filter(f=>f.state==="SD"&&!f.disasterCloseoutDate).length,2);
  if(activeSd>0){score+=activeSd*8;factors.push({label:`${activeSd} Active FEMA Declaration(s) — SD`,pts:activeSd*8,color:"#8050d0"})}
  // Earthquakes — cap at 2
  const sig=Math.min(quakes.filter(q=>q.properties?.mag>=3.0).length,2);
  if(sig>0){score+=sig*5;factors.push({label:`${sig} Earthquake(s) M3.0+ in Region`,pts:sig*5,color:"#10aaaa"})}
  // AQI — cap at 2 cities
  const unhealthy=Math.min(aqi.filter(a=>a.aqi>=150).length,2);
  if(unhealthy>0){score+=unhealthy*5;factors.push({label:`${unhealthy} Location(s) Unhealthy AQI`,pts:unhealthy*5,color:"#e06010"})}
  // Seasonal — only one fires at a time
  const mo=new Date().getMonth()+1;
  if(mo>=3&&mo<=6){score+=5;factors.push({label:"Spring Season Modifier (Mar–Jun)",pts:5,color:"#4080c0"})}
  else if(mo>=7&&mo<=9){score+=5;factors.push({label:"Fire Season Modifier (Jul–Sep)",pts:5,color:"#e06020"})}
  score=Math.min(Math.round(score),100);
  // Realistic thresholds:
  // NORMAL 0-19: routine conditions
  // ELEVATED 20-39: 1-2 moderate factors
  // HIGH 40-64: multiple significant factors
  // CRITICAL 65-100: major multi-domain emergency
  const level=score>=65?"CRITICAL":score>=40?"HIGH":score>=20?"ELEVATED":"NORMAL";
  const lc=score>=65?"#d83828":score>=40?"#d09010":score>=20?"#4090d0":"#1a8c4a";
  return{score,level,lc,factors};
}

/* ═══ TOAST / NOTIFICATION SYSTEM ═══════════ */
function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,color="#d09010")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,color}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),5000);
  },[]);
  return{toasts,add};
}
function ToastContainer({toasts}){
  return <div style={{position:"fixed",bottom:20,right:20,zIndex:8888,display:"flex",flexDirection:"column",gap:6,maxWidth:320}}>
    {toasts.map(t=><div key={t.id} className="toast" style={{background:t.color+"22",border:`1px solid ${t.color}`,color:t.color}}>{t.msg}</div>)}
  </div>;
}

/* ═══ BROWSER PUSH NOTIFICATIONS ════════════ */
function usePushNotifications(alerts,quakes,aqi){
  const lastCount=useRef({alerts:0,quakes:0,unhealthyAqi:0});
  const [permGranted,setPermGranted]=useState(false);

  const requestPerm=async()=>{
    if(!("Notification" in window)){return;}
    const res=await Notification.requestPermission();
    setPermGranted(res==="granted");
  };

  useEffect(()=>{
    if(Notification?.permission==="granted")setPermGranted(true);
  },[]);

  useEffect(()=>{
    if(!permGranted)return;
    const warnCount=alerts.filter(a=>a.properties?.event?.includes("Warning")).length;
    const sigQuakes=quakes.filter(q=>q.properties?.mag>=3.0).length;
    const unhealthy=aqi.filter(a=>a.aqi>=150).length;
    if(warnCount>lastCount.current.alerts&&lastCount.current.alerts>=0){
      new Notification("⚠️ SD ARNG JOC ALERT",{body:`${warnCount} active NWS Warning(s) for South Dakota`,icon:"https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/26a0.png"});
    }
    if(sigQuakes>lastCount.current.quakes&&lastCount.current.quakes>=0){
      new Notification("🌎 Seismic Activity",{body:`${sigQuakes} earthquake(s) M3.0+ near SD region`,icon:"https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f30e.png"});
    }
    if(unhealthy>lastCount.current.unhealthyAqi&&lastCount.current.unhealthyAqi>=0){
      new Notification("💨 Air Quality Alert",{body:`Unhealthy AQI detected at ${unhealthy} SD location(s)`,icon:"https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f32b.png"});
    }
    lastCount.current={alerts:warnCount,quakes:sigQuakes,unhealthyAqi:unhealthy};
  },[alerts,quakes,aqi,permGranted]);

  return{permGranted,requestPerm};
}

/* ═══ SNOWPACK / SNOTEL TAB ══════════════════ */
function SnowpackTab(){
  // NRCS SNOTEL REST API - fetch CSV for each station
  const [snotel,setSnotel]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const fetchSnotel=async()=>{
      const today=new Date();const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const end=fmt(today);const startD=new Date(today);startD.setDate(startD.getDate()-7);const start=fmt(startD);
      const results=await Promise.allSettled(SNOTEL_STATIONS.map(async s=>{
        try{
          const url=`https://wcc.sc.egov.usda.gov/reportGenerator/view_csv/customSingleStationReport/daily/${s.id}:${s.state}:SNTL%7Cid=%22%22%7Cname/${start},${end}/WTEQ::value,SNWD::value,PREC::value,TMAX::value?fitToScreen=false`;
          const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
          const text=await r.text();
          const lines=text.split("\n").filter(l=>!l.startsWith("#")&&l.trim());
          const dataLines=lines.filter(l=>/^\d{4}-\d{2}-\d{2}/.test(l));
          if(dataLines.length===0)return{...s,error:true};
          const latest=dataLines[dataLines.length-1].split(",");
          return{
            ...s,
            date:latest[0]?.trim(),
            swe:parseFloat(latest[1])||null,   // Snow Water Equivalent (in)
            depth:parseFloat(latest[2])||null,  // Snow Depth (in)
            precip:parseFloat(latest[3])||null, // Accumulated Precipitation (in)
            tmax:parseFloat(latest[4])||null,   // Max Temp (°F)
          };
        }catch{return{...s,error:true};}
      }));
      setSnotel(results.map(r=>r.value||r.reason));
      setLoading(false);
    };
    fetchSnotel();
  },[]);

  const avgSWE=snotel.filter(s=>s.swe!=null).reduce((a,s,_,arr)=>a+s.swe/arr.length,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div className="card">
        <CardHdr title="SNOTEL Snowpack Stations — Black Hills / SD Region" icon="❄️" accent="#4090d0" loading={loading}
          extra={<Pill label={`AVG SWE ${avgSWE.toFixed(1)}"` } color="#4090d0" size={9}/>}/>
        <div className="card-body">
          <div style={{fontSize:9,color:"#446070",marginBottom:10,lineHeight:1.7}}>
            Snow Water Equivalent (SWE) measures actual water content in snowpack. Above-normal SWE = elevated spring flood risk.
            Below-normal = drought/low streamflow risk. Updated daily by NRCS SNOTEL network.
          </div>
          {loading?<div style={{color:"#446070",fontSize:11}}>Loading SNOTEL data from NRCS…</div>:(
            <div className="g2">
              {snotel.map((s,i)=>{
                if(s.error)return(
                  <div key={i} className="gc" style={{border:"1px solid #1a2535"}}>
                    <div style={{fontSize:11,color:"#ddeeff",fontWeight:700,marginBottom:4}}>{s.name} <span style={{fontSize:9,color:"#446070"}}>({s.basin})</span></div>
                    <div style={{fontSize:10,color:"#446070"}}>Data unavailable (CORS) — <a href={`https://wcc.sc.egov.usda.gov/nwcc/site?sitenum=${s.id}`} target="_blank" style={{color:"#4090d0"}}>View station ▸</a></div>
                  </div>
                );
                const sweColor=s.swe==null?"#446070":s.swe<2?"#d09010":s.swe<5?"#1a8c4a":"#4090d0";
                return(
                  <div key={i} className="gc" style={{border:`1px solid ${sweColor}28`,borderLeft:`3px solid ${sweColor}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <div>
                        <div style={{fontSize:11,color:"#ddeeff",fontWeight:700}}>{s.name}</div>
                        <div style={{fontSize:9,color:"#446070"}}>{s.basin} · Station #{s.id}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:22,fontWeight:900,color:sweColor,lineHeight:1}}>{s.swe!=null?s.swe.toFixed(1):"–"}<span style={{fontSize:9,color:"#446070",marginLeft:2}}>in SWE</span></div>
                        <div style={{fontSize:9,color:"#446070"}}>{s.date||""}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                      {s.depth!=null&&<div style={{fontSize:10,color:"#9ab8d0"}}>Depth: <span style={{color:"#c0d8f0",fontWeight:700}}>{s.depth}"</span></div>}
                      {s.precip!=null&&<div style={{fontSize:10,color:"#9ab8d0"}}>Accum Precip: <span style={{color:"#c0d8f0",fontWeight:700}}>{s.precip}"</span></div>}
                      {s.tmax!=null&&<div style={{fontSize:10,color:"#9ab8d0"}}>Max Temp: <span style={{color:s.tmax>35?"#e07060":"#80c0f0",fontWeight:700}}>{s.tmax}°F</span></div>}
                    </div>
                    {s.swe!=null&&(
                      <div style={{marginTop:6}}>
                        <div style={{background:"#040810",borderRadius:2,height:5,overflow:"hidden"}}>
                          <div style={{width:`${Math.min(s.swe/20*100,100)}%`,height:"100%",background:sweColor,transition:"width 0.5s"}}/>
                        </div>
                        <div style={{fontSize:8,color:"#446070",marginTop:1}}>0 — 20" scale</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["NRCS SD Snowpack Report","https://www.nrcs.usda.gov/wps/portal/wcc/home/quicklinks/imap#version=168&elements=&networks=!&states=SD&counties=!&hucs=&minElevation=&maxElevation=&elementSelectType=all&activeOnly=true&activationTimeframe=30&addressOnly=false&dataElement=WTEQ&qualifier=None&year=2026&month=3&day=26&contourBasinType=local&contourType=WTEQ&contourTransparency=undefined&legend=default&labels=default&date=2026-03-26&resolution=400&ssl=1","#4090d0"],
              ["NRCS Interactive Snow Map","https://nwcc-apps.sc.egov.usda.gov/imap/","#4090d0"],
              ["Water Supply Forecast","https://www.nrcs.usda.gov/programs-initiatives/sswsf-snow-survey-and-water-supply-forecasting-program","#4090d0"],
            ].map(([l,u,c])=>(
              <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>
            ))}
          </div>
          <div style={{marginTop:10,padding:"8px 10px",background:"#040810",borderRadius:4,border:"1px solid #1a2535",fontSize:9,color:"#446070",lineHeight:1.7}}>
            <strong style={{color:"#4090d0"}}>FLOOD OUTLOOK CONTEXT:</strong> Above-normal snowpack in the Black Hills watershed directly
            feeds the Cheyenne, Belle Fourche, and Missouri River systems. When SWE exceeds 150% of median AND soil is saturated,
            risk of significant spring flooding on the Missouri R at Pierre increases substantially. Coordinate with Army Corps
            (NWD-MR) for reservoir management decisions.
          </div>
        </div>
      </div>

      {/* Snowpack map */}
      <div className="card">
        <CardHdr title="NRCS Snow Water Equivalent Map — SD Region" icon="🗺" accent="#4090d0"/>
        <div style={{background:"#fff",overflow:"hidden",textAlign:"center"}}>
          <img
            src={`https://www.nrcs.usda.gov/Internet/FSE_MEDIA/stelprdb1046107.jpg?t=${Date.now()}`}
            alt="NRCS Snowpack"
            style={{maxWidth:"100%",display:"block",margin:"0 auto",background:"#fff"}}
            onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="block"}}
          />
          <div style={{display:"none",padding:12,color:"#446070",fontSize:10,background:"#0a1020"}}>
            Map unavailable. <a href="https://nwcc-apps.sc.egov.usda.gov/imap/" target="_blank" style={{color:"#4090d0"}}>View NRCS Interactive Map ▸</a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ EARTHQUAKE TAB ════════════════════════ */
function EarthquakeTab({quakes,loading,error}){
  const mag=q=>q.properties?.mag;
  const magColor=m=>m>=5?"#d83828":m>=4?"#d09010":m>=3?"#e0c000":"#22aa5c";
  const sdQuakes=quakes.filter(q=>{
    const c=q.geometry?.coordinates;
    return c&&c[1]>=42&&c[1]<=46.5&&c[0]>=-104.5&&c[0]<=-96.5;
  });
  const nearbyQuakes=quakes.filter(q=>{
    const c=q.geometry?.coordinates;
    return c&&c[1]>=40&&c[1]<=48&&c[0]>=-108&&c[0]<=-94;
  }).slice(0,20);
  const sigCount=quakes.filter(q=>mag(q)>=3.0).length;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div className="card">
        <CardHdr title="USGS Seismic Activity — SD & Region (30 days)" icon="🌎" accent="#10aaaa"
          count={`${sdQuakes.length} IN SD · ${sigCount} M3.0+`} loading={loading} error={error}/>
        <div className="card-body">
          <div style={{marginBottom:10,display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["M5.0+","#d83828"],[" M4.0+","#d09010"],["M3.0+","#e0c000"],["M2.0+","#22aa5c"]].map(([l,c])=>(
              <span key={l} className="pill" style={{background:c+"22",border:`1px solid ${c}55`,color:c,fontSize:9}}>{l}</span>
            ))}
          </div>
          {nearbyQuakes.length===0&&!loading?(
            <div style={{color:"#22aa5c",fontSize:11}}>✓ No significant seismic activity in SD region (30 days)</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {nearbyQuakes.map((q,i)=>{
                const p=q.properties,c=q.geometry?.coordinates,m=mag(q),mc=magColor(m);
                const inSD=c&&c[1]>=42&&c[1]<=46.5&&c[0]>=-104.5&&c[0]<=-96.5;
                return(
                  <div key={i} className="arow" style={{borderLeft:`4px solid ${mc}`,background:mc+"0c"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:18,fontWeight:900,color:mc,minWidth:36}}>M{m?.toFixed(1)}</span>
                        <div>
                          <div style={{fontSize:11,color:"#c8d8e8",fontWeight:600,lineHeight:1.2}}>{p?.place||"Unknown location"}</div>
                          <div style={{fontSize:9,color:"#446070",marginTop:1}}>
                            Depth: {c?.[2]?.toFixed(1)||"–"}km · {new Date(p?.time).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
                          </div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:5}}>
                        {inSD&&<Pill label="SD" color="#d83828" size={9}/>}
                        {m>=4&&<Pill label="SIGNIFICANT" color="#d09010" size={9}/>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
            {[["USGS Earthquake Map","https://earthquake.usgs.gov/earthquakes/map/?extent=40.97989700715396,-109.51171875&extent=48.22467264956519,-92.43164062500001&listOnlyShown&settings=true","#10aaaa"],
              ["SD Seismic Activity","https://earthquake.usgs.gov/earthquakes/map/?extent=42,-104.5&extent=46.5,-96.5","#10aaaa"],
              ["USGS Recent Quakes","https://earthquake.usgs.gov/earthquakes/feed/v1.0/geojson.php","#10aaaa"]
            ].map(([l,u,c])=>(
              <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>
            ))}
          </div>
          <div style={{marginTop:10,padding:"8px 10px",background:"#040810",borderRadius:4,border:"1px solid #1a2535",fontSize:9,color:"#446070",lineHeight:1.7}}>
            <strong style={{color:"#10aaaa"}}>SD SEISMIC CONTEXT:</strong> The Black Hills region and western SD have known fault systems.
            Oilfield injection operations in neighboring states have increased induced seismicity risk. Ellsworth AFB infrastructure
            and Oahe/Fort Randall dam operations require monitoring for seismic events M4.0+. Coordinate with USACE NWD for
            dam integrity assessment thresholds.
          </div>
        </div>
      </div>

      {/* Quake map */}
      <div className="card">
        <CardHdr title="USGS Earthquake Map — SD Region" icon="🗺" accent="#10aaaa"/>
        <iframe src="https://earthquake.usgs.gov/earthquakes/map/?extent=39,-109&extent=49,-93&listOnlyShown" style={{width:"100%",height:340,border:"none"}} title="USGS Quake Map"/>
        <div style={{padding:"5px 12px",fontSize:9,color:"#446070"}}>SOURCE: USGS EARTHQUAKE HAZARDS PROGRAM · REAL-TIME FEED</div>
      </div>
    </div>
  );
}

/* ═══ AQI TAB ═══════════════════════════════ */

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {!apiKey&&(
        <div className="card" style={{borderTop:"2px solid #d09010"}}>
          <div className="card-hdr" style={{borderTop:"2px solid #d09010"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#d09010",letterSpacing:"0.1em"}}>⚙ EPA AIRNOW API KEY REQUIRED</span>
          </div>
          <div className="card-body">
            <div style={{fontSize:11,color:"#90a8b0",marginBottom:10,lineHeight:1.6}}>
              AirNow requires a free API key. Register at <a href="https://docs.airnowapi.org/account/request/" target="_blank" style={{color:"#d09010"}}>docs.airnowapi.org</a> (instant approval).
              Enter your key below — it will be saved in your browser session only.
            </div>
            <div style={{display:"flex",gap:8}}>
              <input
                type="text" placeholder="Paste AirNow API key here…"
                id="airnow-key-input"
                style={{flex:1,padding:"8px 12px",background:"#040810",border:"1px solid #1a3050",borderRadius:4,color:"#b8cce0",fontFamily:"'Share Tech Mono',monospace",fontSize:11}}
              />
              <button onClick={()=>{const v=document.getElementById("airnow-key-input").value.trim();if(v){setApiKey(v);sessionStorage.setItem("airnow_key",v);}}}
                style={{padding:"8px 14px",background:"#d0901020",border:"1px solid #d09010",borderRadius:4,color:"#d09010",fontFamily:"'Share Tech Mono',monospace",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                SAVE
              </button>
            </div>
            <div style={{marginTop:10,fontSize:9,color:"#446070"}}>
              OR view AQI directly: <a href="https://www.airnow.gov/?city=Rapid+City&state=SD&country=USA" target="_blank" style={{color:"#d09010"}}>AirNow.gov ▸</a>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <CardHdr title="Air Quality Index — SD Key Cities" icon="💨" accent="#d09010"
          count={aqi.length>0?`WORST: ${worst.aqi||"–"} ${worstInfo.label}`:"–"} loading={loading} error={error}/>
        <div className="card-body">
          {aqi.length===0&&!loading?(
            <div style={{color:"#446070",fontSize:11,lineHeight:1.7}}>
              {apiKey?"No AQI data returned for SD locations. Monitoring stations may be offline.":"Enter AirNow API key above to enable live AQI monitoring."}
              <br/>
              <a href="https://www.airnow.gov/?city=Rapid+City&state=SD&country=USA" target="_blank" style={{color:"#d09010"}}>▸ View AirNow.gov SD directly</a>
            </div>
          ):(
            <div className="g2">
              {aqi.map((a,i)=>{
                const info=aqiInfo(a.aqi||0);
                return(
                  <div key={i} className="gc" style={{border:`1px solid ${info.color}28`,borderLeft:`3px solid ${info.color}`,background:info.bg}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div style={{fontSize:11,color:"#ddeeff",fontWeight:700}}>{a.city||a.name}</div>
                      <Pill label={info.label} color={info.color}/>
                    </div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
                      <span style={{fontSize:28,fontWeight:900,color:info.color,lineHeight:1}}>{a.aqi||"–"}</span>
                      <span style={{fontSize:9,color:"#446070",paddingBottom:4}}>AQI</span>
                    </div>
                    {a.pollutant&&<div style={{fontSize:9,color:"#446070",marginTop:2}}>Primary: {a.pollutant}</div>}
                    <div style={{marginTop:6,background:"#040810",borderRadius:2,height:5,overflow:"hidden"}}>
                      <div style={{width:`${Math.min((a.aqi||0)/500*100,100)}%`,height:"100%",background:info.color,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["AirNow SD Map","https://www.airnow.gov/?city=Rapid+City&state=SD&country=USA","#d09010"],
              ["Fire & Smoke Map","https://www.airnow.gov/national-maps/","#e06020"],
              ["SD Air Quality","https://denr.sd.gov/des/aqsyear.aspx","#d09010"],
            ].map(([l,u,c])=>(
              <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>

            especially during wildfire events. Smoke from SD or neighboring state fires can rapidly degrade conditions. At AQI 200+,
            consider issuing N95s for outdoor personnel and briefing helicopter/aviation crews on reduced visibility from smoke.
          </div>
        </div>
      </div>

      {/* AQI scale */}
      <div className="card">
        <CardHdr title="AQI Reference Scale" icon="📊" accent="#d09010"/>
        <div className="card-body">
          {AQI_COLORS.map((c,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
              <div style={{width:50,height:18,background:c.color,borderRadius:3,flexShrink:0}}/>
              <div>
                <span style={{fontSize:11,fontWeight:700,color:c.color}}>{c.label}</span>
                <span style={{fontSize:9,color:"#446070",marginLeft:8}}>
                  {i===0?"0–50":i===5?"301–500":`${AQI_COLORS[i-1].max+1}–${c.max}`}
                </span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══ RESERVOIR TAB ═════════════════════════ */
function ReservoirTab({reservoirs,loading,error}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div className="card">
        <CardHdr title="Missouri River Reservoir Levels — SD" icon="🏞" accent="#10aaaa" loading={loading} error={error}/>
        <div className="card-body">
          <div style={{fontSize:9,color:"#446070",marginBottom:10,lineHeight:1.7}}>
            Missouri River mainstem reservoirs managed by Army Corps NWD-MR. Pool elevation data updated 1–4 hours via USGS.
            Full pool = top of conservation storage. Flood pool = base of flood control zone. Releases coordinated with downstream flood management.
          </div>
          <div className="g2">
            {reservoirs.map((r,i)=>{
              const elev=r.elev;const full=r.fullPool;const flood=r.floodPool;
              const pctFull=elev&&full?Math.min(((elev-full+20)/(20))*100+80,100):null;
              const status=!elev?"NO DATA":elev>=flood?"ABOVE FLOOD POOL":elev>=full?"AT FULL POOL":elev>=full-5?"NEAR FULL":"LOW";
              const sc=status==="ABOVE FLOOD POOL"?"#d83828":status==="AT FULL POOL"?"#d09010":status==="NEAR FULL"?"#22aa5c":"#4090d0";
              return(
                <div key={i} className="gc" style={{border:`1px solid ${sc}28`,borderLeft:`3px solid ${sc}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <div>
                      <div style={{fontSize:11,color:"#ddeeff",fontWeight:700}}>{r.name}</div>
                      <div style={{fontSize:9,color:"#446070"}}>{r.note}</div>
                    </div>
                    <Pill label={status} color={sc} size={8}/>
                  </div>
                  <div style={{display:"flex",gap:14,alignItems:"flex-end",marginBottom:4}}>
                    <div>
                      <span style={{fontSize:22,fontWeight:900,color:sc,lineHeight:1}}>{elev?elev.toFixed(1):"–"}</span>
                      <span style={{fontSize:9,color:"#446070",marginLeft:2}}>ft MSL</span>
                    </div>
                    {r.outflow!=null&&<div style={{fontSize:11,color:"#7a9aaa"}}>Out: {r.outflow>=1000?(r.outflow/1000).toFixed(1)+"k":r.outflow.toFixed(0)} cfs</div>}
                  </div>
                  <div style={{fontSize:9,color:"#446070",display:"flex",gap:10,marginBottom:4}}>
                    {full&&<span>Full Pool: {full}ft</span>}
                    {flood&&<span>Flood Pool: {flood}ft</span>}
                  </div>
                  {elev&&full&&(
                    <div style={{background:"#040810",borderRadius:2,height:5,overflow:"hidden"}}>
                      <div style={{position:"relative",height:"100%"}}>
                        <div style={{position:"absolute",left:`${Math.min((full/(flood+5))*100,95)}%`,top:0,bottom:0,width:1,background:"#d09010",opacity:0.7}}/>
                        <div style={{position:"absolute",left:`${Math.min((flood/(flood+5))*100,100)}%`,top:0,bottom:0,width:1,background:"#d83828",opacity:0.7}}/>
                        <div style={{width:`${Math.min((elev/(flood+5))*100,100)}%`,height:"100%",background:sc,transition:"width 0.5s"}}/>
                      </div>
                    </div>
                  )}
                  <div style={{fontSize:8,color:"#304050",marginTop:2}}>USGS #{r.site}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
            {[["Army Corps MR Water Mgmt","https://www.nwd-mr.usace.army.mil/rcc/current.html","#10aaaa"],
              ["MR Reservoir Elevations","https://www.nwd.usace.army.mil/MRWM/Current-Conditions/Reservoir-Elevations/","#10aaaa"],
              ["Daily River Bulletin","https://www.nwd-mr.usace.army.mil/rcc/reports/pdfs/MRBWM_River_Daily.pdf","#10aaaa"],
            ].map(([l,u,c])=>(
              <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ MAIN APP ═══════════════════════════════ */
function App(){
  // Auth
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("joc_auth")==="1");
  // AirNow key
  const [airnowKey,setAirnowKey]=useState(()=>sessionStorage.getItem("airnow_key")||"");

  // Data state
  const [alerts,setAlerts]=useState([]);
  const [gauges,setGauges]=useState([]);
  const [reservoirs,setReservoirs]=useState([]);
  const [fema,setFema]=useState([]);
  const [kev,setKev]=useState([]);
  const [drought,setDrought]=useState(null);
  const [fireDanger,setFireDanger]=useState(null);
  const [quakes,setQuakes]=useState([]);
  const [aqi,setAqi]=useState([]);
  const [activeFiresNIFC,setActiveFiresNIFC]=useState([]);
  const [prepLevel,setPrepLevel]=useState(null);
  const [loading,setLoading]=useState({alerts:true,gauges:true,res:true,fema:true,kev:true,drought:true,fire:true,quakes:true,aqi:false,nifc:true});
  const [errors,setErrors]=useState({});
  const [expanded,setExpanded]=useState(null);
  const [expandedThreat,setExpandedThreat]=useState(null);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [pulse,setPulse]=useState(false);
  const [tab,setTab]=useState("overview");
  const {toasts,add:addToast}=useToast();

  useEffect(()=>{const i=setInterval(()=>setPulse(p=>!p),1200);return()=>clearInterval(i);},[]);

  const {permGranted,requestPerm}=usePushNotifications(alerts,quakes,aqi);

  // Fetch functions
  const fetchAlerts=useCallback(async()=>{
    try{const r=await fetch("https://api.weather.gov/alerts/active?area=SD",{headers:{"User-Agent":"SD-ARNG-JOC/4.0"}});
      const d=await r.json();
      const sorted=(d.features||[]).sort((a,b)=>ar(a.properties.event)-ar(b.properties.event));
      const prev=alerts.length;
      if(prev>0&&sorted.filter(a=>a.properties.event?.includes("Warning")).length>alerts.filter(a=>a.properties.event?.includes("Warning")).length){
        addToast("⚠️ New NWS Warning issued for South Dakota","#d83828");
      }
      setAlerts(sorted);
    }catch{setErrors(e=>({...e,alerts:true}));}
    setLoading(l=>({...l,alerts:false}));
  },[alerts]);

  const fetchGauges=useCallback(async()=>{
    try{const sites=GAUGES.map(g=>g.site).join(",");
      const r=await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${sites}&parameterCd=00065,00060&siteStatus=all`);
      const d=await r.json();const ts=d?.value?.timeSeries||[];const map={};
      ts.forEach(s=>{const site=s.sourceInfo?.siteCode?.[0]?.value,param=s.variable?.variableCode?.[0]?.value,val=parseFloat(s.values?.[0]?.value?.[0]?.value);
        if(!map[site])map[site]={};
        if(param==="00065")map[site].stage=val;if(param==="00060")map[site].flow=val;
      });
      setGauges(GAUGES.map(g=>({...g,...(map[g.site]||{})})));
    }catch{setErrors(e=>({...e,gauges:true}));}
    setLoading(l=>({...l,gauges:false}));
  },[]);

  const fetchReservoirs=useCallback(async()=>{
    try{
      // Use USGS gauges near each reservoir for pool elevation (parameter 62614 = lake/reservoir surface elevation)
      const sites=RESERVOIRS.map(r=>r.site).join(",");
      const r=await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${sites}&parameterCd=62614,00060&siteStatus=all`);
      const d=await r.json();const ts=d?.value?.timeSeries||[];const map={};
      ts.forEach(s=>{const site=s.sourceInfo?.siteCode?.[0]?.value,param=s.variable?.variableCode?.[0]?.value,val=parseFloat(s.values?.[0]?.value?.[0]?.value);
        if(!map[site])map[site]={};
        if(param==="62614")map[site].elev=val;
        if(param==="00060")map[site].outflow=val;
      });
      setReservoirs(RESERVOIRS.map(r=>({...r,...(map[r.site]||{})})));
    }catch{setErrors(e=>({...e,res:true}));}
    setLoading(l=>({...l,res:false}));
  },[]);

  const fetchFema=useCallback(async()=>{
    try{const cut=new Date();cut.setFullYear(cut.getFullYear()-2);const ds=cut.toISOString().split("T")[0];
      const r=await fetch(`https://www.fema.gov/api/open/v2/DisasterDeclarationsSummaries?$filter=state in ('SD','ND','NE','MN','WY','MT') and declarationDate gt '${ds}'&$orderby=declarationDate desc&$top=20&$select=disasterNumber,state,declarationDate,declarationTitle,incidentType,disasterCloseoutDate,designatedArea`);
      const d=await r.json();setFema(d.DisasterDeclarationsSummaries||[]);
    }catch{setErrors(e=>({...e,fema:true}));}
    setLoading(l=>({...l,fema:false}));
  },[]);

  const fetchDrought=useCallback(async()=>{
    try{const end=new Date(),start=new Date();start.setDate(start.getDate()-14);
      const fmt=d=>`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
      const r=await fetch(`https://usdmdataservices.unl.edu/api/StateStatistics/GetDroughtSeverityStatisticsByArea?aoi=SD&startdate=${fmt(start)}&enddate=${fmt(end)}&statisticsType=2`,{headers:{Accept:"application/json"}});
      const text=await r.text();let data;
      try{data=JSON.parse(text);}catch{
        const lines=text.trim().split("\n");
        if(lines.length>=2){const h=lines[0].split(","),v=lines[lines.length-1].split(",");data=[{}];h.forEach((k,i)=>data[0][k.trim()]=v[i]?.trim());}
      }
      if(Array.isArray(data)&&data.length>0)setDrought(data[data.length-1]);
    }catch{setErrors(e=>({...e,drought:true}));}
    setLoading(l=>({...l,drought:false}));
  },[]);

  const fetchKev=useCallback(async()=>{
    try{const r=await fetch("https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json");
      const d=await r.json();
      setKev((d.vulnerabilities||[]).sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded)).slice(0,10));
    }catch{setErrors(e=>({...e,kev:true}));}
    setLoading(l=>({...l,kev:false}));
  },[]);

  const fetchFire=useCallback(async()=>{
    try{const r=await fetch("https://api.weather.gov/gridpoints/UNR/83,71/forecast",{headers:{"User-Agent":"SD-ARNG-JOC/4.0"}});
      const d=await r.json();setFireDanger(d?.properties?.periods?.[0]||null);
    }catch{setErrors(e=>({...e,fire:true}));}
    setLoading(l=>({...l,fire:false}));
  },[]);

  const fetchQuakes=useCallback(async()=>{
    try{
      // USGS real-time GeoJSON — last 30 days, M1.5+, SD bounding box + buffer
      const r=await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2026-02-24&minmagnitude=1.5&minlatitude=40&maxlatitude=48&minlongitude=-108&maxlongitude=-94&orderby=magnitude&limit=50");
      const d=await r.json();
      const features=(d.features||[]).sort((a,b)=>(b.properties?.mag||0)-(a.properties?.mag||0));
      setQuakes(features);
      const sig=features.filter(q=>q.properties?.mag>=3.0).length;
      if(sig>0)addToast(`🌎 ${sig} seismic event(s) M3.0+ detected in SD region`,"#10aaaa");
    }catch{setErrors(e=>({...e,quakes:true}));}
    setLoading(l=>({...l,quakes:false}));
  },[]);

  const fetchNIFC=useCallback(async()=>{
    try{
      // NIFC WFIGS active fire incidents — SD bounding box + 200-mile buffer
      // Covers SD (42-46.5N, 104.5-96.5W) plus regional fires that could affect resources
      const bbox="-108,39,-93,49"; // expanded region
      const url=`https://services9.arcgis.com/RHVPKKiFTONKtxq3/arcgis/rest/services/USA_Wildfires_v1/FeatureServer/0/query?where=1%3D1&geometry=${encodeURIComponent(bbox)}&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&outFields=IncidentName,IncidentTypeCategory,IncidentSize,PercentContained,DiscoveryAcres,FireCause,POOState,POOCounty,IncidentShortDescription,StructuresThreatenedTotal,StructuresDestroyedTotal,ModifiedOnDateTime_dt,FireDiscoveryDateTime&returnGeometry=false&orderByFields=IncidentSize+DESC&resultRecordCount=30&f=json`;
      const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
      const d=await r.json();
      const features=(d.features||[]).map(f=>f.attributes).filter(f=>f.IncidentName);
      setActiveFiresNIFC(features);
      // Check for new SD fires
      const sdFires=features.filter(f=>f.POOState==="SD"||f.POOState==="South Dakota");
      if(sdFires.length>0)addToast(`🔥 ${sdFires.length} active wildfire incident(s) in/near South Dakota`,"#e06020");
    }catch(e){
      // Fallback: try InciWeb accessible view as text
      setErrors(er=>({...er,nifc:true}));
    }
    // Also fetch NIFC National Preparedness Level from NIFC stats page
    try{
      const r2=await fetch("https://www.nifc.gov/fire-information/nfn",{signal:AbortSignal.timeout(8000)});
      const text=await r2.text();
      const match=text.match(/Preparedness Level[^\d]*(\d)/i)||text.match(/PL\s*(\d)/i);
      if(match)setPrepLevel(parseInt(match[1]));
    }catch{}
    setLoading(l=>({...l,nifc:false}));
  },[]);

  const fetchAqi=useCallback(async()=>{
    if(!airnowKey){setLoading(l=>({...l,aqi:false}));return;}
    setLoading(l=>({...l,aqi:true}));
    const results=await Promise.allSettled(AQI_LOCATIONS.map(async loc=>{
      try{
        const r=await fetch(`https://www.airnowapi.org/aq/observation/latLong/current/?format=application/json&latitude=${loc.lat}&longitude=${loc.lon}&distance=25&API_KEY=${airnowKey}`);
        const d=await r.json();
        if(!Array.isArray(d)||d.length===0)return{...loc,aqi:null};
        const best=d.sort((a,b)=>(b.AQI||0)-(a.AQI||0))[0];
        return{...loc,aqi:best.AQI,pollutant:best.ParameterName,category:best.Category?.Name};
      }catch{return{...loc,aqi:null};}
    }));
    setAqi(results.map(r=>r.value||r.reason||{}));
    setLoading(l=>({...l,aqi:false}));
  },[airnowKey]);

  const refreshAll=useCallback(()=>{
    setLoading({alerts:true,gauges:true,res:true,fema:true,kev:true,drought:true,fire:true,quakes:true,aqi:!!airnowKey,nifc:true});
    setErrors({});
    fetchAlerts();fetchGauges();fetchReservoirs();fetchFema();fetchDrought();fetchKev();fetchFire();fetchQuakes();fetchAqi();fetchNIFC();
    setLastUpdate(new Date());
  },[fetchAlerts,fetchGauges,fetchReservoirs,fetchFema,fetchDrought,fetchKev,fetchFire,fetchQuakes,fetchAqi,fetchNIFC,airnowKey]);

  useEffect(()=>{if(authed){refreshAll();}const i=setInterval(()=>{if(authed)refreshAll();},5*60*1000);return()=>clearInterval(i);},[authed]);
  useEffect(()=>{if(authed&&airnowKey)fetchAqi();},[airnowKey]);

  // Derived — must be before any conditional return (React hooks rules)
  const critAlerts=alerts.filter(a=>a.properties?.event?.includes("Warning")).length;
  const floodA=alerts.filter(a=>a.properties?.event?.toLowerCase().includes("flood")).length;
  const fireA=alerts.filter(a=>a.properties?.event?.toLowerCase().includes("fire")||a.properties?.event?.toLowerCase().includes("red flag")).length;
  const highG=gauges.filter(g=>g.stage&&g.t&&g.stage>=g.t.f).length;
  const sdFema=fema.filter(f=>f.state==="SD");
  const activeFema=fema.filter(f=>!f.disasterCloseoutDate);
  const sigQuakes=quakes.filter(q=>q.properties?.mag>=3.0).length;
  const worstAqi=aqi.reduce((a,b)=>((b.aqi||0)>(a.aqi||0)?b:a),{aqi:0});
  const sdFires=activeFiresNIFC.filter(f=>f.POOState==="SD"||f.POOState==="South Dakota");
  const nearbyFires=activeFiresNIFC.filter(f=>f.POOState!=="SD"&&f.POOState!=="South Dakota");
  const totalFireAcres=activeFiresNIFC.reduce((a,f)=>a+(f.IncidentSize||0),0);
  const risk=useMemo(()=>computeRisk(alerts,gauges,drought,fema,quakes,aqi),[alerts,gauges,drought,fema,quakes,aqi]);
  const elevated=risk.level==="CRITICAL"||risk.level==="HIGH";

  if(!authed)return <Login onAuth={()=>setAuthed(true)}/>;


  const TABS=[
    {id:"overview",label:"OVERVIEW",icon:"⬡"},
    {id:"map",label:"MAP",icon:"🗺"},
    {id:"weather",label:"WEATHER",icon:"⛈"},
    {id:"water",label:"WATER",icon:"🌊"},
    {id:"reservoir",label:"RESERVOIRS",icon:"🏞"},
    {id:"fire",label:"FIRE",icon:"🔥"},
    {id:"drought",label:"DROUGHT",icon:"🌵"},
    {id:"snow",label:"SNOWPACK",icon:"❄️"},
    {id:"quake",label:"SEISMIC",icon:"🌎"},
    {id:"aqi",label:"AIR QUALITY",icon:"💨"},
    {id:"predict",label:"RISK MODEL",icon:"🎯"},
    {id:"roads",label:"ROADS/POWER",icon:"🛣"},
    {id:"fema",label:"FEMA",icon:"📋"},
    {id:"leo",label:"LE/CYBER",icon:"🛡"},
  ];

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#05080d"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#0a1828,#05080d)",borderBottom:"1px solid #1a2535",padding:"7px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:38,height:38,borderRadius:4,background:"linear-gradient(135deg,#0e2010,#183820)",border:"1px solid #1a8c4a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#22aa5c",fontWeight:900,boxShadow:"0 0 10px #1a8c4a40",flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.1,textAlign:"center"}}>SD<br/>NG</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#ddeeff",letterSpacing:"0.08em",fontFamily:"'Barlow Condensed',sans-serif"}}>SD ARNG · JOINT OPERATIONS CENTER</div>
            <div style={{fontSize:7,color:"#446070",letterSpacing:"0.16em"}}>EMERGENCY SITUATIONAL AWARENESS · UNCLASSIFIED OPEN-SOURCE · v6.0</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <div style={{padding:"3px 9px",borderRadius:3,background:elevated?pulse?"#d8382840":"#d8382818":risk.lc+"15",border:`1px solid ${elevated?"#d83828":risk.lc}`,color:elevated?"#d83828":risk.lc,fontSize:9,fontWeight:700,letterSpacing:"0.1em",transition:"background 0.4s"}}>
            {elevated?<><span className="pulse-dot" style={{background:"#d83828",marginRight:4}}/>ELEVATED</>:"✓ NORMAL"}
          </div>
          <div style={{fontSize:12,fontWeight:700,color:risk.lc,fontFamily:"'Barlow Condensed',sans-serif"}}>RISK {risk.score}/100 — {risk.level}</div>
          {/* Push notification button */}
          <div style={{position:"relative"}}>
            <button onClick={permGranted?()=>{}:requestPerm} title={permGranted?"Notifications active":"Enable push notifications"}
              style={{background:permGranted?"#22aa5c18":"#446070",border:`1px solid ${permGranted?"#22aa5c":"#446070"}`,borderRadius:3,padding:"4px 8px",cursor:"pointer",fontSize:11,color:permGranted?"#22aa5c":"#b8cce0"}}>
              🔔
            </button>
            {critAlerts>0&&<span className="notif-badge">{critAlerts}</span>}
          </div>
          {lastUpdate&&<div style={{fontSize:7,color:"#446070",textAlign:"right"}}>UPDATED<br/>{lastUpdate.toLocaleTimeString()}</div>}
          <button onClick={refreshAll} style={{background:"#1560a018",border:"1px solid #1560a0",color:"#2080d0",borderRadius:3,padding:"3px 9px",cursor:"pointer",fontSize:9,fontWeight:700,letterSpacing:"0.1em",fontFamily:"'Share Tech Mono',monospace"}}>⟳ REFRESH</button>
          <button onClick={()=>{sessionStorage.removeItem("joc_auth");setAuthed(false);}} style={{background:"#d8382812",border:"1px solid #d83828",color:"#d83828",borderRadius:3,padding:"3px 9px",cursor:"pointer",fontSize:9,fontWeight:700,letterSpacing:"0.1em",fontFamily:"'Share Tech Mono',monospace"}}>LOCK</button>
        </div>
      </div>

      {/* SUMMARY STRIP */}
      <div style={{display:"flex",flexWrap:"wrap",borderBottom:"1px solid #1a2535",background:"#0b1018"}}>
        {[
          {l:"WARNINGS",v:critAlerts,c:critAlerts>0?"#d83828":"#22aa5c",t:"weather"},
          {l:"FLOOD",v:floodA,c:floodA>0?"#d09010":"#22aa5c",t:"weather"},
          {l:"FIRE WX",v:fireA,c:fireA>0?"#e06020":"#22aa5c",t:"fire"},
          {l:"ACTIVE FIRES",v:activeFiresNIFC.length,c:activeFiresNIFC.length>0?"#e06020":"#22aa5c",t:"fire"},
          {l:"ABOVE FLOOD",v:highG,c:highG>0?"#d09010":"#22aa5c",t:"water"},
          {l:"DROUGHT",v:drought?["D0","D1","D2","D3","D4"].reduceRight((a,c)=>a||(parseFloat(drought[c]||0)>0?c:null),null)||"None":"–",c:"#e0a000",isStr:true,t:"drought"},
          {l:"SEISMIC M3+",v:sigQuakes,c:sigQuakes>0?"#10aaaa":"#22aa5c",t:"quake"},
          {l:"WORST AQI",v:worstAqi.aqi||"–",c:aqiInfo(worstAqi.aqi||0).color,isStr:worstAqi.aqi==null,t:"aqi"},
          {l:"RISK SCORE",v:risk.score,c:risk.lc,t:"predict"},
          {l:"FEMA SD",v:sdFema.length,c:sdFema.length>0?"#8050d0":"#22aa5c",t:"fema"},
          {l:"ACTIVE FEMA",v:activeFema.length,c:activeFema.length>0?"#d83828":"#22aa5c",t:"fema"},
        ].map((i,k)=>(
          <div key={k} style={{flex:"1 1 70px",padding:"5px 8px",textAlign:"center",borderRight:"1px solid #1a2535",cursor:"pointer"}} onClick={()=>i.t&&setTab(i.t)}>
            <div style={{fontSize:i.isStr?12:19,fontWeight:900,color:i.c,lineHeight:1,textShadow:`0 0 6px ${i.c}50`}}>{i.v}</div>
            <div style={{fontSize:7,color:"#446070",letterSpacing:"0.07em",marginTop:1}}>{i.l}</div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #1a2535",background:"#0b1018",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            {t.icon} {t.label}
            {t.id==="predict"&&<span style={{marginLeft:3,fontSize:8,color:risk.lc,fontWeight:900}}>{risk.score}</span>}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{flex:1,padding:12,overflowY:"auto"}} className="fade-in">

        {/* OVERVIEW */}
        {tab==="overview"&&(
          <div className="g2">
            {/* Risk */}
            <div className="card" style={{borderTop:`2px solid ${risk.lc}`,background:`linear-gradient(180deg,${risk.lc}10,#0b1018 50%)`}}>
              <div className="card-hdr" style={{borderTop:`2px solid ${risk.lc}`}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><span>🎯</span><span style={{fontSize:10,fontWeight:700,color:"#ddeeff",letterSpacing:"0.1em"}}>COMPOSITE RISK — CLICK FOR DETAILS</span></div>
              </div>
              <div className="card-body">
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:8}}>
                  <div style={{fontSize:48,fontWeight:900,color:risk.lc,lineHeight:1,textShadow:`0 0 14px ${risk.lc}70`,cursor:"pointer"}} onClick={()=>setTab("predict")}>{risk.score}</div>
                  <div><div style={{fontSize:18,fontWeight:900,color:risk.lc}}>{risk.level}</div><div style={{fontSize:8,color:"#446070",marginTop:2}}>→ RISK MODEL TAB</div></div>
                </div>
                <div style={{background:"#040810",borderRadius:3,height:8,overflow:"hidden",marginBottom:6}}>
                  <div style={{width:`${risk.score}%`,height:"100%",background:`linear-gradient(90deg,#1a8c4a,${risk.lc})`,transition:"width 1s"}}/>
                </div>
                {risk.factors.slice(0,4).map((f,i)=><div key={i} style={{fontSize:9,color:f.color,marginBottom:2}}>· {f.label} <span style={{color:"#446070"}}>+{f.pts}</span></div>)}
              </div>
            </div>
            {/* Alerts */}
            <div className="card" style={{borderTop:`2px solid ${critAlerts>0?"#d83828":"#1a8c4a"}`}}>
              <CardHdr title="NWS Alerts" icon="⚠️" accent={critAlerts>0?"#d83828":"#1a8c4a"} count={alerts.length} loading={loading.alerts}/>
              <div className="card-body">
                {alerts.length===0?<div style={{color:"#22aa5c",fontSize:11}}>✓ No active alerts</div>:
                  alerts.slice(0,5).map((a,i)=>{const p=a.properties,col=ac(p.event);return(
                    <div key={i} className="arow" style={{borderLeft:`3px solid ${col}`,background:col+"10",marginBottom:3}}>
                      <div style={{color:col,fontWeight:700,fontSize:11}}>{p.event}</div>
                      <div style={{color:"#446070",fontSize:9}}>{p.areaDesc?.split(";")[0]?.trim()}</div>
                    </div>
                  );})}
                {alerts.length>5&&<div style={{fontSize:9,color:"#446070"}}>+{alerts.length-5} more → Weather tab</div>}
              </div>
            </div>
            {/* Drought */}
            <div className="card" style={{borderTop:"2px solid #e0a000"}}>
              <CardHdr title="Drought — SD" icon="🌵" accent="#e0a000" loading={loading.drought}/>
              <div className="card-body">
                {drought?["D4","D3","D2","D1","D0"].map(code=>{const pct=parseFloat(drought[code]||0);if(pct<0.5)return null;const dl=DROUGHT_LEVELS.find(d=>d.code===code);return(
                  <div key={code} style={{marginBottom:5}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:10,color:dl.color,fontWeight:700}}>{code} — {dl.label}</span><span style={{fontSize:12,fontWeight:700,color:dl.color}}>{pct.toFixed(1)}%</span></div>
                    <div style={{background:"#040810",borderRadius:2,height:5,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:dl.color}}/></div>
                  </div>
                );}):(<div style={{color:"#446070",fontSize:11}}>Loading… <a href="https://droughtmonitor.unl.edu/CurrentMap/StateDroughtMonitor.aspx?SD" target="_blank" style={{color:"#e0a000"}}>▸ USDM</a></div>)}
              </div>
            </div>
            {/* Seismic + AQI */}
            <div className="card" style={{borderTop:"2px solid #10aaaa"}}>
              <CardHdr title="Seismic + Air Quality" icon="🌎" accent="#10aaaa"/>
              <div className="card-body">
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:9,color:"#446070",letterSpacing:"0.1em",marginBottom:5}}>SEISMIC — M3.0+ EVENTS (30 DAYS)</div>
                  {sigQuakes===0?<div style={{color:"#22aa5c",fontSize:11}}>✓ No M3.0+ events in SD region</div>:
                    quakes.filter(q=>q.properties?.mag>=3.0).slice(0,3).map((q,i)=>{const p=q.properties,m=p?.mag;return(
                      <div key={i} style={{fontSize:10,marginBottom:3,color:"#b8cce0"}}>

                </div>
                <div style={{padding:"4px 12px",fontSize:8,color:"#446070"}}>VIIRS/MODIS satellite detection · Not all heat signatures are wildfires</div>
              </div>
              <div className="card">
                <CardHdr title="NIFC Active Fire Perimeters" icon="🗺" accent="#d83828"/>
                <div style={{background:"#0a1020",padding:"10px 12px",minHeight:120}}>
                  <div style={{fontSize:10,color:"#b8cce0",marginBottom:8,lineHeight:1.6}}>
                    NIFC WFIGS publishes active fire perimeters updated every 5 minutes. The ArcGIS portal requires authentication for the embedded map — access directly via the links below.
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {[
                      ["▸ NIFC Current Fire Perimeters Explorer","https://data-nifc.opendata.arcgis.com/datasets/nifc::wfigs-current-wildland-fire-perimeters/explore","#d83828"],
                      ["▸ NIFC 2026 Perimeters to Date","https://data-nifc.opendata.arcgis.com/maps/nifc::wfigs-2026-wildland-fire-perimeters-to-date","#d83828"],
                      ["▸ InciWeb — SD Active Incidents","https://inciweb.wildfire.gov/state/south-dakota","#e06020"],
                      ["▸ NIFC Incident Map","https://www.nifc.gov/nicc/incident-information/national-incident-map","#d09010"],
                    ].map(([l,u,c])=><a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>{l}</a>)}
                  </div>
                </div>
                <div style={{padding:"4px 12px",fontSize:8,color:"#446070"}}>SOURCE: NIFC WFIGS · Large fires only · Small fires may not appear immediately</div>
              </div>
            </div>

            {/* RESOURCES */}
            <div className="card" style={{borderTop:"2px solid #e06020"}}>
              <CardHdr title="Fire Resources & Reference Links" icon="🔗" accent="#e06020"/>
              <div className="card-body"><div className="g2">
                {[
                  ["🔴 InciWeb — SD Active Incidents","https://inciweb.wildfire.gov/state/south-dakota","#d83828"],
                  ["🔴 NIFC Daily Situation Report","https://www.nifc.gov/nicc-files/sitreprt.pdf","#d83828"],
                  ["🟠 SD Grassland Fire Danger Map","https://www.weather.gov/unr/rfd","#e06020"],
                  ["🟠 SD Wildland Fire Briefing","https://wildlandfire.sd.gov/operations/firefighterbriefing.aspx","#e06020"],
                  ["🟠 Great Plains Fire Information","https://www.greatplainsfire.org/","#e06020"],
                  ["🟡 NIFC Fire Weather Outlook","https://www.nifc.gov/fire-information/nfn","#d09010"],
                  ["🟡 SD Wildland Fire — Fire Info","https://wildlandfire.sd.gov/fireinfo/fireinfo.aspx","#d09010"],
                  ["🟡 NIFC Open Data — Perimeters","https://data-nifc.opendata.arcgis.com/","#d09010"],
                  ["🔵 NASA FIRMS Fire Map SD","https://firms.modaps.eosdis.nasa.gov/usfs/map/#d:24hrs;@-101.0,44.5,7z","#2080d0"],
                  ["🔵 Black Hills Fire Restrictions","https://www.fs.usda.gov/blackhills","#2080d0"],
                ].map(([l,u,c])=>(
                  <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"10",border:`1px solid ${c}25`,display:"block",lineHeight:1.5}}>{l}</a>
                ))}
              </div></div>
            </div>

          </div>
        )}

        {/* DROUGHT */}
        {tab==="drought"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card">
              <CardHdr title="US Drought Monitor — South Dakota" icon="🌵" accent="#e0a000" loading={loading.drought} error={errors.drought}/>
              <div className="card-body">
                {drought?(
                  <>
                    <div style={{marginBottom:10}}>
                      {["D4","D3","D2","D1","D0"].map(code=>{const pct=parseFloat(drought[code]||0);const dl=DROUGHT_LEVELS.find(d=>d.code===code);if(pct<0.1)return null;return(
                        <div key={code} style={{marginBottom:6}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,color:dl.color,fontWeight:700}}>{code} — {dl.label}</span><span style={{fontSize:13,fontWeight:700,color:dl.color}}>{pct.toFixed(1)}%</span></div>
                          <div style={{background:"#040810",borderRadius:3,height:7,overflow:"hidden"}}><div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:dl.color,transition:"width 0.8s"}}/></div>
                        </div>
                      );})}
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <a href="https://droughtmonitor.unl.edu/CurrentMap/StateDroughtMonitor.aspx?SD" target="_blank" className="lbtn" style={{color:"#e0a000",background:"#e0a00015",border:"1px solid #e0a00030"}}>▸ SD Drought Map</a>
                      <a href="https://www.drought.gov/states/south-dakota" target="_blank" className="lbtn" style={{color:"#2090e0",background:"#2090e015",border:"1px solid #2090e030"}}>▸ Drought.gov SD</a>
                    </div>
                  </>
                ):<div style={{color:"#446070",fontSize:11}}>Drought data loading… <a href="https://droughtmonitor.unl.edu/CurrentMap/StateDroughtMonitor.aspx?SD" target="_blank" style={{color:"#e0a000"}}>View USDM ▸</a></div>}
              </div>
            </div>
            <div className="card"><CardHdr title="Current SD Drought Map" icon="🗺" accent="#e0a000"/>
              <div style={{background:"#fff",overflow:"hidden"}}><img src={`https://droughtmonitor.unl.edu/data/png/current/current_sd_trd.png?t=${Date.now()}`} style={{width:"100%",display:"block",maxHeight:300,objectFit:"contain",background:"#fff"}} alt="Drought Map" onError={e=>e.target.style.display="none"}/></div>
              <div style={{padding:"5px 12px",fontSize:8,color:"#446070"}}>SOURCE: USDM — NDMC/NOAA/USDA · UPDATED THURSDAYS</div>
            </div>
          </div>
        )}

        {/* SNOWPACK */}
        {tab==="snow"&&<SnowpackTab/>}

        {/* EARTHQUAKE */}
        {tab==="quake"&&<EarthquakeTab quakes={quakes} loading={loading.quakes} error={errors.quakes}/>}

        {/* AQI */}
        {tab==="aqi"&&<AQITab aqi={aqi} loading={loading.aqi} error={errors.aqi} apiKey={airnowKey} setApiKey={setAirnowKey}/>}

        {/* RISK MODEL */}
        {tab==="predict"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="card" style={{borderTop:`2px solid ${risk.lc}`,background:`linear-gradient(180deg,${risk.lc}10,#0b1018 50%)`}}>
              <CardHdr title="SD Emergency Risk Model — Composite Score" icon="🎯" accent={risk.lc} extra={<Pill label="AI-ASSISTED" color="#4090d0" size={9}/>}/>
              <div className="card-body">
                <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:14,flexWrap:"wrap"}}>
                  <div style={{textAlign:"center"}}><div style={{fontSize:60,fontWeight:900,color:risk.lc,lineHeight:1,textShadow:`0 0 18px ${risk.lc}70`}}>{risk.score}</div><div style={{fontSize:8,color:"#446070",letterSpacing:"0.1em"}}>RISK SCORE /100</div></div>
                  <div><div style={{fontSize:26,fontWeight:900,color:risk.lc,letterSpacing:"0.1em"}}>{risk.level}</div><div style={{fontSize:9,color:"#90a8b8",marginTop:3,maxWidth:260}}>
                    {risk.level==="CRITICAL"?"Immediate NG activation consideration warranted. Multiple concurrent high-impact events.":
                     risk.level==="HIGH"?"Heightened readiness posture. Pre-position resources and brief command chain.":
                     risk.level==="ELEVATED"?"Monitor closely. 24-hour readiness posture recommended.":
                     "Normal operations. Continue routine monitoring."}
                  </div></div>
                </div>
                <div style={{background:"#040810",borderRadius:5,height:14,overflow:"hidden",marginBottom:6,position:"relative"}}>
                  {[25,50,75].map(v=><div key={v} style={{position:"absolute",left:`${v}%`,top:0,bottom:0,width:1,background:"#ffffff18"}}/>)}
                  <div style={{width:`${risk.score}%`,height:"100%",background:`linear-gradient(90deg,#1a8c4a,${risk.lc})`,transition:"width 1s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:7,color:"#446070",marginBottom:12}}>
                  <span>0 NORMAL</span><span>20 ELEVATED</span><span>40 HIGH</span><span>65 CRITICAL</span><span>100</span>
                </div>
                <div style={{fontSize:9,color:"#446070",letterSpacing:"0.1em",marginBottom:6}}>CONTRIBUTING FACTORS</div>
                {risk.factors.length===0?<div style={{color:"#22aa5c",fontSize:11}}>✓ No significant risk factors</div>:
                  risk.factors.map((f,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 9px",background:f.color+"10",border:`1px solid ${f.color}28`,borderRadius:3,marginBottom:3}}><span style={{fontSize:10,color:"#b8cce0"}}>{f.label}</span><span style={{fontSize:11,fontWeight:700,color:f.color}}>+{f.pts}</span></div>)}
                <div style={{marginTop:8,fontSize:8,color:"#304050",lineHeight:1.6}}>INPUTS: NWS Alerts · USGS Gauges · USDM Drought · OpenFEMA · USGS Seismic · EPA AQI · Seasonal Modifiers</div>
              </div>
            </div>

            {/* 30-Day Outlook */}
            <div className="card" style={{borderTop:"2px solid #4090d0"}}>
              <CardHdr title="30-Day Threat Outlook" icon="📅" accent="#4090d0"/>
              <div className="card-body"><div className="g2">
                {[
                  {label:"Flood Risk",level:gauges.filter(g=>g.stage&&g.t&&g.stage>=g.t.a).length>0?"ELEVATED":"NORMAL",reason:"Spring snowmelt season. Monitor Missouri R, Big Sioux, James R.",icon:"🌊"},
                  {label:"Wildfire Risk",level:alerts.filter(a=>a.properties?.event?.toLowerCase().includes("fire")).length>0?"HIGH":"ELEVATED",reason:"NIFC Prep Level 2. SD/NE fire outbreak March 12. Black Hills timber.",icon:"🔥"},
                  {label:"Drought Escalation",level:drought&&parseFloat(drought.D2||0)>10?"HIGH":"ELEVATED",reason:"Below-normal precipitation forecast. Plains drought expanding.",icon:"🌵"},
                  {label:"Severe Weather",level:new Date().getMonth()>=3&&new Date().getMonth()<=8?"ELEVATED":"NORMAL",reason:"Spring/summer convective season. Tornado/hail risk for eastern SD.",icon:"⛈"},
                  {label:"Seismic",level:sigQuakes>0?"ELEVATED":"NORMAL",reason:"Monitor Black Hills fault systems and induced seismicity near state borders.",icon:"🌎"},
                  {label:"Cyber Threat",level:"HIGH",reason:"Nation-state elevated ops. State gov IT targeted regionally.",icon:"🛡"},
                  {label:"Air Quality",level:aqi.filter(a=>(a.aqi||0)>=150).length>0?"HIGH":"NORMAL",reason:"Wildfire smoke risk. Monitor during fire season and high-wind events.",icon:"💨"},
                  {label:"Winter Storm",level:new Date().getMonth()<=2||new Date().getMonth()>=10?"ELEVATED":"NORMAL",reason:"Western SD blizzard corridor. Interstate closure risk.",icon:"❄️"},
                ].map((o,i)=>{const oc={"CRITICAL":"#d83828","HIGH":"#d09010","ELEVATED":"#4090d0","NORMAL":"#1a8c4a"}[o.level];return(
                  <div key={i} className="gc" style={{borderLeft:`3px solid ${oc}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:11}}>{o.icon} <span style={{fontSize:10,fontWeight:700,color:"#c8d8e8"}}>{o.label}</span></span>
                      <Pill label={o.level} color={oc}/>
                    </div>
                    <div style={{fontSize:9,color:"#6888a0",lineHeight:1.5}}>{o.reason}</div>
                  </div>
                );})}
              </div></div>
            </div>

            {/* Recommendations */}
            <div className="card" style={{borderTop:"2px solid #8050d0"}}>
              <CardHdr title="Commander Action Checklist" icon="⚡" accent="#8050d0"/>

                {(risk.score>=65?[
                  {p:"IMMEDIATE",a:"Alert TAG and JFHQ-SD — critical multi-hazard event in progress",c:"#d83828"},
                  {p:"IMMEDIATE",a:"Review 72-hr recall rosters for engineer, MP, aviation, and medical units",c:"#d83828"},
                  {p:"URGENT",a:"Coordinate with SD DPS / SDEM on unified command and resource staging",c:"#d09010"},
                  {p:"URGENT",a:"Pre-position high-water rescue assets in eastern SD flood zones",c:"#d09010"},
                  {p:"PLANNING",a:"Brief JFHQ-SD on current threat picture and 30-day outlook",c:"#4090d0"},
                  {p:"PLANNING",a:"Review Title 32 and State Active Duty authority thresholds with JAG",c:"#4090d0"},
                ]:risk.score>=40?[
                  {p:"URGENT",a:"Alert Battalion/Brigade commanders — elevated operational tempo likely",c:"#d09010"},
                  {p:"URGENT",a:"Coordinate with SD DPS / Emergency Management on resource pre-positioning",c:"#d09010"},
                  {p:"PLANNING",a:"Brief JFHQ-SD on current threat picture and 30-day outlook",c:"#4090d0"},
                  {p:"PLANNING",a:"Review activation timelines and current equipment availability",c:"#4090d0"},
                ]:risk.score>=20?[
                  {p:"URGENT",a:"Maintain heightened SA — multiple concurrent risk factors present",c:"#d09010"},
                  {p:"URGENT",a:"Duty officer monitoring dashboard and NWS alerts continuously",c:"#d09010"},
                  {p:"PLANNING",a:"Review activation timelines and pre-positioned equipment lists",c:"#4090d0"},
                  {p:"PLANNING",a:"Coordinate with county emergency managers in highest-risk counties",c:"#4090d0"},
                ]:[
                  {p:"ROUTINE",a:"Continue daily SA monitoring — no immediate action required",c:"#1a8c4a"},
                  {p:"ROUTINE",a:"Monitor evolving drought, fire weather, and snowmelt forecasts",c:"#1a8c4a"},
                  {p:"ROUTINE",a:"Maintain current training and readiness posture",c:"#1a8c4a"},
                ]).map((r,i)=>(
                  <div key={i} style={{display:"flex",gap:9,padding:"6px 9px",background:r.c+"0e",border:`1px solid ${r.c}22`,borderRadius:3,marginBottom:4}}>
                    <Pill label={r.p} color={r.c} size={9}/>
                    <span style={{fontSize:10,color:"#b0c8d8",lineHeight:1.5,flex:1}}>{r.a}</span>
                  </div>
                ))}
                <div style={{marginTop:8,padding:"7px 9px",background:"#040810",borderRadius:3,fontSize:8,color:"#304050",lineHeight:1.6}}>
                  DISCLAIMER: Automated decision-support tool using open-source data only. All recommendations require validation by qualified emergency management and legal personnel. NG activations require TAG, Governor's office, and SDCL coordination.
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ROADS & POWER */}
        {tab==="roads"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignItems:"start"}}>

            <div className="card" style={{borderTop:"2px solid #22aa5c"}}>
              <CardHdr title="SD 511 — Road Conditions & Closures" icon="🛣" accent="#22aa5c"/>
              <div style={{height:340}}><iframe src="https://sd511.org/" style={{width:"100%",height:"100%",border:"none"}} title="SD511"/></div>
              <div style={{padding:"8px 12px",borderTop:"1px solid #1a2535"}}>
                <div style={{fontSize:9,color:"#446070",marginBottom:6,lineHeight:1.6}}>
                  SD511 provides real-time road conditions, closures, and incidents on all Interstate, US, and State Routes. Updated every 2–5 minutes.
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[["SD511 Full Map","https://sd511.org/","#22aa5c"],["SD DOT Travel Info","https://dot.sd.gov/travelers/travelers","#22aa5c"],["Winter Road Alerts","https://dot.sd.gov/travelers/travelers/road-constructiontravel-conditions/","#d09010"]].map(([l,u,c])=>(
                    <a key={l} href={u} target="_blank" className="lbtn" style={{color:c,background:c+"12",border:`1px solid ${c}25`}}>▸ {l}</a>
                  ))}
                </div>
                <div style={{fontSize:8,color:"#446070",marginTop:6}}>📱 Text <strong style={{color:"#22aa5c"}}>SDInterstates</strong> to 605-836-8836 for interstate closure alerts</div>
              </div>
            </div>

            {/* RIGHT — Power Outages */}
            <div className="card" style={{borderTop:"2px solid #d09010"}}>
              <CardHdr title="Power Outages — South Dakota" icon="⚡" accent="#d09010"/>
              <div style={{padding:"10px 12px"}}>
                {/* SD Rural Electric outage map */}
                <div style={{fontSize:9,color:"#446070",marginBottom:8,letterSpacing:"0.08em",fontWeight:700}}>SD RURAL ELECTRIC ASSOCIATION — COOPERATIVE OUTAGES</div>
